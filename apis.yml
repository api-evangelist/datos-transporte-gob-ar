apis:
  - aid: datos-transporte-gob-ar:catalog
    name: Datos Transporte Argentina CKAN Action API
    description: >-
      CKAN Action API for Datos Transporte Argentina, a consistent JSON-over-HTTP interface over a catalog of 48 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://datos.transporte.gob.ar/api/3/action/.
