aid: datos-transporte-gob-ar
name: Datos Transporte Argentina
description: >-
  Datos Transporte Argentina is a government agency open-data portal for Argentina running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 48 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
